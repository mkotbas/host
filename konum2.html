<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bayi Konum Otomasyonu (Guzergah Analizli)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f9f9f9;
    }
    .header {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      padding: 15px;
      background: linear-gradient(to right, #ff5c5c, #8b0000);
      color: white;
      border-radius: 8px;
      margin-bottom: 20px;
      width: 90%;
      max-width: 800px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    #search {
      display: block;
      margin: 0 auto 20px;
      width: 90%;
      max-width: 500px;
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .buttons-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      width: 90%;
      max-width: 800px;
    }
    .buttons-container button,
    #customButton {
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background-color: #059862;
      color: white;
      text-align: center;
      white-space: nowrap;
    }
    #customButton:hover,
    .buttons-container button:hover { background-color: #047c4d; }
    #fileInput { display: none; }

    .table-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background-color: #f2f2f2;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .select-column { text-align: center; width: 80px; }
    .select-column input { width: 20px; height: 20px; cursor: pointer; }
    .action-column { display: flex; gap: 5px; justify-content: center; }
    .map-button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 36px;
      height: 36px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s;
    }
    .map-button.google { background-color: #4285F4; }
    .map-button.yandex { background-color: #FF0000; }
    .map-button.copy { background-color: #059862; }
    .map-button.status-button { background-color: #5b4db1; }
    .map-button:hover { transform: scale(1.1); }

    .status-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
      box-sizing: border-box;
    }
    .status-modal.show { display: flex; }
    .status-panel {
      width: 100%;
      max-width: 1000px;
      max-height: 92vh;
      overflow-y: auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      padding: 22px;
      box-sizing: border-box;
    }
    .status-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .status-title {
      font-size: 22px;
      font-weight: 700;
      color: #212121;
      margin: 0;
    }
    .status-subtitle {
      margin: 4px 0 0;
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }
    .status-close {
      border: none;
      background: #f2f2f2;
      color: #333;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .status-loading {
      background: #f7f8fc;
      border: 1px solid #e9ebf3;
      border-radius: 12px;
      padding: 16px;
      color: #444;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .status-warning {
      background: #fff8e6;
      border: 1px solid #f2d07d;
      color: #7a5700;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 14px;
      line-height: 1.6;
      font-size: 14px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .status-grid-three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .status-card {
      border: 1px solid #ececec;
      border-radius: 14px;
      padding: 16px;
      background: #fcfcfd;
    }
    .status-card h3 { margin: 0 0 12px; font-size: 17px; color: #222; }
    .status-line { margin: 7px 0; font-size: 14px; color: #444; line-height: 1.45; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .status-good { background: #e7f7ed; color: #17643b; }
    .status-warn { background: #fff4df; color: #8a5a00; }
    .status-bad { background: #ffe6e6; color: #a12626; }
    .status-list {
      margin: 0;
      padding-left: 18px;
      color: #444;
      font-size: 14px;
      line-height: 1.55;
    }
    .status-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }
    .status-actions button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #059862;
      color: white;
      font-size: 14px;
    }
    .status-actions button.secondary { background: #54617a; }
    .status-actions button.ghost { background: #e8edf6; color: #334; }
    .status-small {
      font-size: 12px;
      color: #666;
      margin-top: 12px;
      line-height: 1.5;
    }
    .route-steps {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .route-step {
      border: 1px solid #e8ebf0;
      border-radius: 12px;
      padding: 12px;
      background: white;
    }
    .route-step-title {
      font-size: 14px;
      font-weight: 700;
      color: #212121;
      margin-bottom: 6px;
    }
    .route-step-meta {
      font-size: 13px;
      color: #5a6270;
      margin-bottom: 6px;
    }
    .route-step-text {
      font-size: 14px;
      color: #444;
      line-height: 1.55;
    }
    .inline-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0 4px;
    }
    .inline-form input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #d9dce3;
      border-radius: 8px;
      font-size: 14px;
    }
    .mini-note {
      font-size: 12px;
      color: #606978;
      margin-top: 6px;
      line-height: 1.45;
    }

    @media (max-width: 900px) {
      .status-grid-three { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .status-panel { padding: 18px; }
      .status-grid { grid-template-columns: 1fr; }
      .status-title { font-size: 19px; }
      .inline-form { grid-template-columns: 1fr; }
      .buttons-container {
        flex-wrap: nowrap;
        gap: 5px;
        width: 100%;
        padding: 0 5px;
        box-sizing: border-box;
      }
      .buttons-container button,
      #customButton {
        flex: 1;
        padding: 10px 2px;
        font-size: 12px;
        min-width: 0;
      }
      thead { display: none; }
      table, tbody { display: block; width: 100%; }
      tr {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 15px;
        background-color: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.06);
        padding: 15px;
        position: relative;
      }
      td { display: block; border: none; padding: 2px 0; font-size: 14px; }
      td:nth-child(6) {
        order: 1; width: 100%; font-weight: 800; font-size: 18px; color: #1a1a1a;
        margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #eee;
      }
      td:nth-child(1) { order: 2; width: auto; color: #2c3e50; font-weight: 700; font-size: 15px; }
      td:nth-child(1)::after { content: "•"; color: #bbb; margin: 0 6px; font-weight: normal; }
      td:nth-child(2) { order: 3; width: auto; color: #555; font-size: 15px; }
      td:nth-child(5) {
        order: 4; width: auto; margin-left: 8px; background-color: #e3f2fd;
        color: #1565c0; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: bold;
        display: flex; align-items: center;
      }
      td:nth-child(5)::before { content: "#"; margin-right: 2px; opacity: 0.6; }
      tr::after { content: ""; width: 100%; order: 5; height: 15px; }
      td:nth-child(3) { order: 6; width: auto; display: flex; align-items: center; text-align: left; }
      td:nth-child(3)::before { content: "Seç"; font-size: 14px; margin-right: 4px; color: #059862; font-weight: bold; }
      td:nth-child(4) { order: 7; width: auto; display: flex; align-items: center; margin-left: 8px; text-align: left; }
      td:nth-child(4)::before { content: "Görüntü"; font-size: 14px; margin-right: 4px; color: #cc0000; font-weight: bold; }
      td:nth-child(7) { order: 8; width: auto; margin-left: auto; }
      .action-column { display: flex; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="header">Bayi Konum Otomasyonu</div>
  <input type="text" id="search" placeholder="Bayi, Şehir veya Kod Ara..." />

  <div class="buttons-container">
    <label for="fileInput" id="customButton">Yükle</label>
    <input type="file" id="fileInput" accept=".xlsx, .xls" />
    <button id="copyButton">Kopyala</button>
    <button id="clearButton">Temizle</button>
    <button id="dbButton">Sıfırla</button>
  </div>

  <div class="table-container">
    <table id="resultsTable" style="display:none;">
      <thead>
        <tr>
          <th>Şehir</th>
          <th>İlçe</th>
          <th class="select-column">Seç</th>
          <th class="select-column">Görüntülü</th>
          <th>Bayi Kodu</th>
          <th>Bayi Adı</th>
          <th>Konum</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="status-modal" id="statusModal">
    <div class="status-panel">
      <div class="status-header">
        <div>
          <h2 class="status-title" id="statusTitle">Güzergah Durumu</h2>
          <div class="status-subtitle" id="statusSubtitle">Konum analizi hazırlanıyor...</div>
        </div>
        <button class="status-close" id="statusClose" aria-label="Kapat">×</button>
      </div>
      <div id="statusContent">
        <div class="status-loading">Bilgiler yükleniyor...</div>
      </div>
    </div>
  </div>

  <script>
    let excelData = [];
    let selectedCodes = [];
    let videoCodes = new Set();
    const statusCache = new Map();
    const WEATHER_API = 'https://api.open-meteo.com/v1/forecast';
    const REVERSE_API = 'https://nominatim.openstreetmap.org/reverse';
    const OVERPASS_API = 'https://overpass-api.de/api/interpreter';
    const ROUTE_API_BASE = 'https://router.project-osrm.org/route/v1/driving';
    const GEOLOCATION_OPTIONS = { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 };

    function parseCoordinates(coordinates) {
      if (!coordinates || typeof coordinates !== 'string') return null;
      const cleaned = coordinates.trim().replace(/\s+/g, '');
      const parts = cleaned.split(',');
      if (parts.length !== 2) return null;
      const lat = Number(parts[0]);
      const lon = Number(parts[1]);
      if (Number.isNaN(lat) || Number.isNaN(lon)) return null;
      if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return null;
      return { lat, lon, raw: cleaned };
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function weatherCodeToText(code) {
      const map = {
        0: 'Açık', 1: 'Çoğunlukla açık', 2: 'Parçalı bulutlu', 3: 'Kapalı',
        45: 'Sis', 48: 'Yoğun kırağılı sis',
        51: 'Hafif çiseleme', 53: 'Orta çiseleme', 55: 'Yoğun çiseleme',
        56: 'Donan hafif çiseleme', 57: 'Donan yoğun çiseleme',
        61: 'Hafif yağmur', 63: 'Orta yağmur', 65: 'Şiddetli yağmur',
        66: 'Donan hafif yağmur', 67: 'Donan yoğun yağmur',
        71: 'Hafif kar', 73: 'Orta kar', 75: 'Yoğun kar', 77: 'Kar taneleri',
        80: 'Hafif sağanak', 81: 'Orta sağanak', 82: 'Şiddetli sağanak',
        85: 'Hafif kar sağanağı', 86: 'Yoğun kar sağanağı',
        95: 'Gök gürültülü fırtına', 96: 'Hafif dolulu fırtına', 99: 'Yoğun dolulu fırtına'
      };
      return map[Number(code)] || 'Bilinmiyor';
    }

    function getWeatherRiskFromPoint(point) {
      const code = Number(point.weather_code);
      const temp = Number(point.temperature_2m);
      const wind = Number(point.wind_speed_10m || 0);
      const snowfall = Number(point.snowfall || 0);
      const visibility = Number(point.visibility || 99999);
      const precipitation = Number(point.precipitation || 0);

      if ([75, 86, 99].includes(code) || snowfall >= 1.5) {
        return { level: 'bad', label: 'Yüksek risk', text: 'Yoğun kar veya sert hava görülebilir.' };
      }
      if ([71, 73, 77, 85, 66, 67].includes(code) || snowfall > 0 || temp <= 1) {
        return { level: 'warn', label: 'Dikkat', text: 'Kar, don veya buzlanma riski var.' };
      }
      if (wind >= 55 || visibility < 1000 || precipitation >= 5) {
        return { level: 'warn', label: 'Dikkat', text: 'Rüzgar, düşük görüş veya kuvvetli yağış sürüşü etkileyebilir.' };
      }
      return { level: 'good', label: 'Normal', text: 'Belirgin hava riski görünmüyor.' };
    }

    function formatVisibility(meters) {
      if (!meters && meters !== 0) return 'Bilinmiyor';
      return meters >= 1000 ? `${(meters / 1000).toFixed(1)} km` : `${meters} m`;
    }

    function km(value) {
      return `${(Number(value) / 1000).toFixed(1)} km`;
    }

    function minutes(value) {
      const total = Math.round(Number(value) / 60);
      if (total < 60) return `${total} dk`;
      const h = Math.floor(total / 60);
      const m = total % 60;
      return m ? `${h} sa ${m} dk` : `${h} sa`;
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function createRouteSamples(coords) {
      const points = Array.isArray(coords) ? coords : [];
      if (!points.length) return [];
      const targetCount = Math.min(7, Math.max(4, Math.ceil(points.length / 25)));
      const sampleIndexes = [];
      for (let i = 0; i < targetCount; i++) {
        const idx = Math.round((i * (points.length - 1)) / (targetCount - 1));
        sampleIndexes.push(idx);
      }
      const uniqueIndexes = [...new Set(sampleIndexes)];
      let cumulativeKm = 0;
      const samples = [];
      let prev = null;
      uniqueIndexes.forEach((idx, order) => {
        const [lon, lat] = points[idx];
        if (prev) cumulativeKm += haversineKm(prev.lat, prev.lon, lat, lon);
        prev = { lat, lon };
        samples.push({
          index: idx,
          lat,
          lon,
          distanceKm: Number(cumulativeKm.toFixed(1)),
          label: order === 0 ? 'Başlangıç' : (order === uniqueIndexes.length - 1 ? 'Varış' : `Rota ${Math.round((order / (uniqueIndexes.length - 1)) * 100)}%`)
        });
      });
      return samples;
    }

    function buildCoordinateBatch(samples) {
      return {
        latitudes: samples.map(s => s.lat).join(','),
        longitudes: samples.map(s => s.lon).join(',')
      };
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`İstek başarısız: ${response.status}`);
      return response.json();
    }

    async function fetchWeatherBatch(samples) {
      const batch = buildCoordinateBatch(samples);
      const params = new URLSearchParams({
        latitude: batch.latitudes,
        longitude: batch.longitudes,
        current: 'temperature_2m,apparent_temperature,precipitation,snowfall,weather_code,wind_speed_10m,visibility',
        timezone: 'auto'
      });
      return fetchJson(`${WEATHER_API}?${params.toString()}`);
    }

    function normalizeWeatherBatchResponse(response, count) {
      if (Array.isArray(response)) return response;
      if (response && Array.isArray(response.responses)) return response.responses;
      if (response && response.current && count === 1) return [response];
      if (response && response.latitude !== undefined && count === 1) return [response];
      return [];
    }

    async function fetchLocationName(lat, lon) {
      const params = new URLSearchParams({ lat, lon, format: 'jsonv2', 'accept-language': 'tr' });
      return fetchJson(`${REVERSE_API}?${params.toString()}`);
    }

    async function getCurrentPositionAsync() {
      if (!navigator.geolocation) throw new Error('Bu cihazda konum özelliği desteklenmiyor.');
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, raw: `${pos.coords.latitude},${pos.coords.longitude}` }),
          err => reject(new Error(err && err.code === 1 ? 'Mevcut konum izni verilmedi. Tarayıcıdan izin verip tekrar deneyin.' : 'Mevcut konum alınamadı.')),
          GEOLOCATION_OPTIONS
        );
      });
    }

    async function fetchRoute(start, end) {
      const params = new URLSearchParams({ overview: 'full', geometries: 'geojson', steps: 'true' });
      const url = `${ROUTE_API_BASE}/${start.lon},${start.lat};${end.lon},${end.lat}?${params.toString()}`;
      const data = await fetchJson(url);
      if (!data.routes || !data.routes.length) throw new Error('Güzergah bulunamadı.');
      return data.routes[0];
    }

    function simplifyForPolyline(points, maxPoints = 30) {
      if (points.length <= maxPoints) return points;
      const result = [];
      for (let i = 0; i < maxPoints; i++) {
        const idx = Math.round((i * (points.length - 1)) / (maxPoints - 1));
        result.push(points[idx]);
      }
      return result;
    }

    async function fetchRoadDataAlongRoute(routeCoords) {
      const sampleCoords = simplifyForPolyline(routeCoords, 14);
      const pointQueries = sampleCoords.map(([lon, lat]) => `
        way(around:250,${lat},${lon})[highway=construction];
        way(around:250,${lat},${lon})[construction];
        way(around:250,${lat},${lon})[hazard=roadworks];
        node(around:250,${lat},${lon})[hazard=roadworks];
        relation(around:250,${lat},${lon})[hazard=roadworks];
      `).join('\n');

      const query = `
        [out:json][timeout:25];
        (
          ${pointQueries}
        );
        out tags center 80;
      `;

      const response = await fetch(OVERPASS_API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: query
      });
      if (!response.ok) throw new Error(`Yol verisi alınamadı: ${response.status}`);
      const data = await response.json();
      const elements = Array.isArray(data.elements) ? data.elements : [];
      const uniqueMap = new Map();
      elements.forEach(el => uniqueMap.set(`${el.type}-${el.id}`, el));
      const unique = [...uniqueMap.values()];
      const constructions = unique.filter(el => el.tags && (el.tags.highway === 'construction' || el.tags.construction));
      const roadworks = unique.filter(el => el.tags && el.tags.hazard === 'roadworks');
      return {
        totalIssues: constructions.length + roadworks.length,
        constructionCount: constructions.length,
        roadworksCount: roadworks.length,
        sampleNames: unique
          .map(el => el.tags && (el.tags.name || el.tags.ref || el.tags.construction || el.tags.highway || el.tags.hazard))
          .filter(Boolean)
          .slice(0, 8)
      };
    }

    function attachWeatherToSamples(samples, weatherResponses) {
      return samples.map((sample, index) => {
        const pointWeather = weatherResponses[index] && weatherResponses[index].current ? weatherResponses[index].current : {};
        const risk = getWeatherRiskFromPoint(pointWeather);
        return { ...sample, weather: pointWeather, risk };
      });
    }

    function getOverallRouteRisk(samplePoints, roadData) {
      const hasBad = samplePoints.some(p => p.risk.level === 'bad');
      const hasWarn = samplePoints.some(p => p.risk.level === 'warn');
      if (hasBad || roadData.totalIssues >= 2) {
        return { badge: 'status-bad', label: 'Zorlu rota', text: 'Rota boyunca dikkat gerektiren hava veya yol riski var.' };
      }
      if (hasWarn || roadData.totalIssues === 1) {
        return { badge: 'status-warn', label: 'Dikkatli gidin', text: 'Rota boyunca bölgesel risk görülebilir.' };
      }
      return { badge: 'status-good', label: 'Genel olarak uygun', text: 'Rota boyunca belirgin risk görünmüyor.' };
    }

    function buildEncounterSummary(samplePoints, roadData, route) {
      const parts = [];
      const snowPoints = samplePoints.filter(p => [71,73,75,77,85,86].includes(Number(p.weather.weather_code)) || Number(p.weather.snowfall || 0) > 0);
      const coldPoints = samplePoints.filter(p => Number(p.weather.temperature_2m) <= 1);
      const lowVisibility = samplePoints.filter(p => Number(p.weather.visibility || 99999) < 1000);
      const rainPoints = samplePoints.filter(p => [61,63,65,80,81,82].includes(Number(p.weather.weather_code)) || Number(p.weather.precipitation || 0) >= 1);

      if (snowPoints.length) parts.push(`Rota üzerinde ${snowPoints.length} örnek noktada kar veya kar riski var.`);
      else if (coldPoints.length) parts.push(`Bazı bölümlerde sıcaklık ${coldPoints.map(p => `${p.label.toLowerCase()} ${p.weather.temperature_2m}°C`).slice(0,2).join(', ')} seviyesine düşüyor; buzlanma olabilir.`);
      else if (rainPoints.length) parts.push(`Rota boyunca yağmur görülebilecek bölümler var.`);
      else parts.push('Örneklenen rota noktalarında belirgin kar/yağış engeli görünmüyor.');

      if (lowVisibility.length) parts.push('Bazı bölümlerde görüş düşebilir.');
      if (roadData.totalIssues > 0) parts.push(`Güzergah çevresinde ${roadData.totalIssues} yol çalışması/kapanış kaydı bulundu.`);
      else parts.push('Güzergah çevresinde belirgin yol çalışması kaydı görünmüyor.');

      parts.push(`Tahmini mesafe ${km(route.distance)}, süre ${minutes(route.duration)}.`);
      return parts;
    }

    function buildSampleCards(samplePoints) {
      return samplePoints.map(point => `
        <div class="route-step">
          <div class="route-step-title">${escapeHtml(point.label)}</div>
          <div class="route-step-meta">Yaklaşık ${point.distanceKm.toFixed(1)} km nokta • ${point.lat.toFixed(4)}, ${point.lon.toFixed(4)}</div>
          <div class="status-badge ${point.risk.level === 'bad' ? 'status-bad' : point.risk.level === 'warn' ? 'status-warn' : 'status-good'}">${escapeHtml(point.risk.label)}</div>
          <div class="route-step-text">
            ${escapeHtml(weatherCodeToText(point.weather.weather_code))} • ${escapeHtml(point.weather.temperature_2m)}°C • Kar ${escapeHtml(point.weather.snowfall || 0)} cm • Yağış ${escapeHtml(point.weather.precipitation || 0)} mm • Rüzgar ${escapeHtml(point.weather.wind_speed_10m || 0)} km/sa • Görüş ${escapeHtml(formatVisibility(point.weather.visibility))}
          </div>
        </div>
      `).join('');
    }

    function buildInstructionList(route) {
      const steps = (((route.legs || [])[0] || {}).steps || []).slice(0, 8);
      if (!steps.length) return '<div class="route-step">Adım verisi bulunamadı.</div>';
      return steps.map((step, index) => {
        const name = step.name || 'İsimsiz yol';
        const maneuver = step.maneuver && step.maneuver.type ? step.maneuver.type : 'devam';
        return `
          <div class="route-step">
            <div class="route-step-title">${index + 1}. ${escapeHtml(name)}</div>
            <div class="route-step-meta">${escapeHtml(maneuver)} • ${km(step.distance)} • ${minutes(step.duration)}</div>
            <div class="route-step-text">Bu adım için haritadaki rotayı takip edin.</div>
          </div>
        `;
      }).join('');
    }

    function renderStatusModal(result) {
      const content = document.getElementById('statusContent');
      const title = document.getElementById('statusTitle');
      const subtitle = document.getElementById('statusSubtitle');
      const routeRisk = getOverallRouteRisk(result.samplePoints, result.road);
      const summaryList = buildEncounterSummary(result.samplePoints, result.road, result.route);
      const destinationRisk = result.samplePoints[result.samplePoints.length - 1].risk;

      title.textContent = result.bayiAdi ? `${result.bayiAdi} - Güzergah Durumu` : 'Güzergah Durumu';
      subtitle.textContent = `${result.startName || 'Mevcut konum'} → ${result.destinationName || 'Hedef konum'} • ${result.end.lat.toFixed(5)}, ${result.end.lon.toFixed(5)}`;

      content.innerHTML = `
        <div class="status-warning">
          Bu ekran hedef noktayı değil, mevcut konumundan hedefe kadar güzergahı analiz eder. Hava verisi canlı tahmindir; yol çalışması bölümü OpenStreetMap kayıtlarından üretilir ve resmi trafik yayını değildir.
        </div>
        <div class="status-card">
          <h3>Başlangıç noktası</h3>
          <div class="inline-form">
            <input id="manualStartInput" placeholder="Başlangıç koordinatı: enlem,boylam" value="${escapeHtml(result.start.raw || `${result.start.lat},${result.start.lon}`)}" />
            <input value="${escapeHtml(result.destinationName || '')}" disabled />
          </div>
          <div class="status-actions" style="margin-top:10px;">
            <button onclick="retryRouteWithCurrentLocation()">Konumumu yeniden al</button>
            <button class="secondary" onclick="retryRouteWithManualStart()">Yukarıdaki koordinattan tekrar analiz et</button>
          </div>
          <div class="mini-note">Konum izni vermezsen başlangıç koordinatını yukarıya elle yazıp ikinci düğmeye basabilirsin.</div>
        </div>
        <div class="status-grid-three">
          <div class="status-card">
            <h3>Genel rota özeti</h3>
            <div class="status-badge ${routeRisk.badge}">${routeRisk.label}</div>
            <div class="status-line"><strong>Mesafe:</strong> ${km(result.route.distance)}</div>
            <div class="status-line"><strong>Tahmini süre:</strong> ${minutes(result.route.duration)}</div>
            <div class="status-line"><strong>Örnek kontrol noktası:</strong> ${result.samplePoints.length}</div>
            <div class="status-line"><strong>Yorum:</strong> ${escapeHtml(routeRisk.text)}</div>
          </div>
          <div class="status-card">
            <h3>Hedefte beklenen durum</h3>
            <div class="status-badge ${destinationRisk.level === 'bad' ? 'status-bad' : destinationRisk.level === 'warn' ? 'status-warn' : 'status-good'}">${escapeHtml(destinationRisk.label)}</div>
            <div class="status-line"><strong>Durum:</strong> ${escapeHtml(weatherCodeToText(result.samplePoints[result.samplePoints.length - 1].weather.weather_code))}</div>
            <div class="status-line"><strong>Sıcaklık:</strong> ${escapeHtml(result.samplePoints[result.samplePoints.length - 1].weather.temperature_2m)}°C</div>
            <div class="status-line"><strong>Kar:</strong> ${escapeHtml(result.samplePoints[result.samplePoints.length - 1].weather.snowfall || 0)} cm</div>
            <div class="status-line"><strong>Görüş:</strong> ${escapeHtml(formatVisibility(result.samplePoints[result.samplePoints.length - 1].weather.visibility))}</div>
            <div class="status-line"><strong>Not:</strong> Hedefe vardığında seni karşılayacak en güncel özet.</div>
          </div>
          <div class="status-card">
            <h3>Yol kaydı</h3>
            <div class="status-badge ${result.road.totalIssues > 0 ? 'status-warn' : 'status-good'}">${result.road.totalIssues > 0 ? 'Kayıt bulundu' : 'Belirgin kayıt yok'}</div>
            <div class="status-line"><strong>Toplam kayıt:</strong> ${result.road.totalIssues}</div>
            <div class="status-line"><strong>Yapım/kapanış:</strong> ${result.road.constructionCount}</div>
            <div class="status-line"><strong>Roadworks etiketi:</strong> ${result.road.roadworksCount}</div>
            <div class="status-line"><strong>Örnek kayıtlar:</strong> ${result.road.sampleNames.length ? escapeHtml(result.road.sampleNames.join(', ')) : 'Bulunamadı'}</div>
          </div>
        </div>
        <div class="status-grid">
          <div class="status-card">
            <h3>Yolda karşılaşabileceklerin</h3>
            <ul class="status-list">
              ${summaryList.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
            </ul>
          </div>
          <div class="status-card">
            <h3>İlk rota adımları</h3>
            <div class="route-steps">
              ${buildInstructionList(result.route)}
            </div>
          </div>
        </div>
        <div class="status-card" style="margin-top:14px;">
          <h3>Rota boyunca örnek noktalar</h3>
          <div class="route-steps">
            ${buildSampleCards(result.samplePoints)}
          </div>
        </div>
        <div class="status-actions">
          <button onclick="window.open('https://www.google.com/maps/dir/?api=1&origin=${result.start.lat},${result.start.lon}&destination=${result.end.lat},${result.end.lon}&travelmode=driving', '_blank')">Google'da rota aç</button>
          <button onclick="window.open('https://yandex.com.tr/harita/?rtext=${result.start.lat},${result.start.lon}~${result.end.lat},${result.end.lon}&rtt=auto', '_blank')">Yandex'te rota aç</button>
          <button class="secondary" onclick="navigator.clipboard.writeText('${result.end.raw}').then(() => alert('Hedef koordinat kopyalandı.'))">Hedef koordinatı kopyala</button>
          <button class="ghost" onclick="navigator.clipboard.writeText(${JSON.stringify('').replace(/""/, JSON.stringify(''))})" style="display:none"></button>
        </div>
        <div class="status-small">
          Not: Bu analiz, cihaz konumun ile hedef arasında rota üretir. Trafik yoğunluğu, anlık kaza ve geçici polis/çalışma kapanışları her zaman veri kaynağına düşmeyebilir; kritik sahalarda harita uygulamasında canlı trafik ile son kontrol yap.
        </div>
      `;
    }

    function showLoadingModal(bayiAdi, endCoords) {
      document.getElementById('statusTitle').textContent = bayiAdi ? `${bayiAdi} - Güzergah Durumu` : 'Güzergah Durumu';
      document.getElementById('statusSubtitle').textContent = `${endCoords.lat.toFixed(5)}, ${endCoords.lon.toFixed(5)} için güzergah hazırlanıyor...`;
      document.getElementById('statusContent').innerHTML = '<div class="status-loading">1/3 Mevcut konum alınıyor...<br>2/3 Rota çıkarılıyor...<br>3/3 Rota boyunca hava ve yol bilgisi toplanıyor...</div>';
      document.getElementById('statusModal').classList.add('show');
    }

    function showStatusError(message, bayiAdi, coords) {
      document.getElementById('statusTitle').textContent = bayiAdi ? `${bayiAdi} - Güzergah Durumu` : 'Güzergah Durumu';
      document.getElementById('statusSubtitle').textContent = coords ? `${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}` : 'Konum bilgisi okunamadı';
      document.getElementById('statusContent').innerHTML = `
        <div class="status-warning">${escapeHtml(message)}</div>
        <div class="status-card">
          <h3>Elle başlangıç gir</h3>
          <div class="inline-form">
            <input id="manualStartInput" placeholder="Başlangıç koordinatı: enlem,boylam" />
            <input value="${coords ? escapeHtml(coords.raw) : ''}" disabled />
          </div>
          <div class="status-actions" style="margin-top:10px;">
            <button onclick="retryRouteWithCurrentLocation()">Konumumu tekrar dene</button>
            <button class="secondary" onclick="retryRouteWithManualStart()">Elle girilen koordinatla devam et</button>
          </div>
          <div class="mini-note">Örnek başlangıç biçimi: 39.92077,32.85411</div>
        </div>
      `;
      document.getElementById('statusModal').classList.add('show');
    }

    async function analyzeRouteFlow(bayiAdi, endCoords, startCoords, useCache = true) {
      const cacheKey = `${startCoords.raw || `${startCoords.lat},${startCoords.lon}`}=>${endCoords.raw}`;
      if (useCache && statusCache.has(cacheKey)) {
        renderStatusModal(statusCache.get(cacheKey));
        document.getElementById('statusModal').classList.add('show');
        return;
      }

      showLoadingModal(bayiAdi, endCoords);

      try {
        const route = await fetchRoute(startCoords, endCoords);
        const routeCoords = route.geometry && route.geometry.coordinates ? route.geometry.coordinates : [];
        if (!routeCoords.length) throw new Error('Rota geometrisi alınamadı.');

        const samples = createRouteSamples(routeCoords);
        const [weatherResponse, road, destinationName, startName] = await Promise.all([
          fetchWeatherBatch(samples),
          fetchRoadDataAlongRoute(routeCoords).catch(() => ({ totalIssues: 0, constructionCount: 0, roadworksCount: 0, sampleNames: [] })),
          fetchLocationName(endCoords.lat, endCoords.lon).catch(() => null),
          fetchLocationName(startCoords.lat, startCoords.lon).catch(() => null)
        ]);

        const weatherResponses = normalizeWeatherBatchResponse(weatherResponse, samples.length);
        const samplePoints = attachWeatherToSamples(samples, weatherResponses);
        const result = {
          bayiAdi,
          start: startCoords,
          end: endCoords,
          route,
          road,
          samplePoints,
          destinationName: destinationName && (destinationName.display_name || ''),
          startName: startName && (startName.display_name || '')
        };

        statusCache.set(cacheKey, result);
        window.lastRouteContext = { bayiAdi, endCoords };
        renderStatusModal(result);
        document.getElementById('statusModal').classList.add('show');
      } catch (error) {
        window.lastRouteContext = { bayiAdi, endCoords };
        showStatusError(error.message || 'Güzergah analizi yapılamadı.', bayiAdi, endCoords);
      }
    }

    async function openStatusPanel(bayiAdi, coordinates) {
      const endCoords = parseCoordinates(coordinates);
      if (!endCoords) {
        alert('Geçerli koordinat bulunamadı. Beklenen format: enlem,boylam');
        return;
      }
      showLoadingModal(bayiAdi, endCoords);
      try {
        const startCoords = await getCurrentPositionAsync();
        await analyzeRouteFlow(bayiAdi, endCoords, startCoords);
      } catch (error) {
        window.lastRouteContext = { bayiAdi, endCoords };
        showStatusError(error.message || 'Mevcut konum alınamadı.', bayiAdi, endCoords);
      }
    }

    async function retryRouteWithCurrentLocation() {
      if (!window.lastRouteContext) return;
      try {
        const startCoords = await getCurrentPositionAsync();
        await analyzeRouteFlow(window.lastRouteContext.bayiAdi, window.lastRouteContext.endCoords, startCoords, false);
      } catch (error) {
        showStatusError(error.message || 'Konum tekrar alınamadı.', window.lastRouteContext.bayiAdi, window.lastRouteContext.endCoords);
      }
    }

    async function retryRouteWithManualStart() {
      if (!window.lastRouteContext) return;
      const input = document.getElementById('manualStartInput');
      const manual = parseCoordinates(input ? input.value : '');
      if (!manual) {
        alert('Başlangıç koordinatı geçersiz. Örnek: 39.92077,32.85411');
        return;
      }
      await analyzeRouteFlow(window.lastRouteContext.bayiAdi, window.lastRouteContext.endCoords, manual, false);
    }

    function checkDataExpiry() {
      const lastUploadDate = localStorage.getItem('lastUploadDate');
      if (lastUploadDate) {
        const currentDate = new Date();
        const uploadDate = new Date(lastUploadDate);
        const differenceInDays = (currentDate - uploadDate) / (1000 * 3600 * 24);
        if (differenceInDays > 30) {
          localStorage.removeItem('lastUploadDate');
          localStorage.removeItem('excelData');
          alert('Veritabanı süresi dolmuş ve silinmiştir.');
        }
      }
    }

    function saveDataToLocalStorage() {
      localStorage.setItem('lastUploadDate', new Date().toISOString());
      localStorage.setItem('excelData', JSON.stringify(excelData));
    }

    function openYandexMaps(coordinates) {
      const cleanedCoords = coordinates.trim().replace(/\s+/g, '');
      const [lat, lon] = cleanedCoords.split(',');
      const url = `https://yandex.com.tr/harita/?rtext=~${lat},${lon}&rtt=auto`;
      window.open(url, '_blank');
    }

    function displayResults(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      const table = document.getElementById('resultsTable');
      table.style.display = (data.length > 0 || excelData.length > 1) ? 'table' : 'none';

      data.forEach((row, index) => {
        if (index === 0 && (row[7] === 'Bayi Kodu' || row[7] === undefined)) return;
        if (!row[7]) return;

        const sehir = row[4] || '';
        const ilce = row[5] || '';
        const bayiKodu = row[7].toString();
        const bayiAdi = row[9] || '';
        const konum = row[10] || '';

        const tr = document.createElement('tr');
        const cells = [sehir, ilce, 'SEÇ', 'GÖRÜNTÜLÜ', bayiKodu, bayiAdi, konum];

        cells.forEach((cell, colIndex) => {
          const td = document.createElement('td');

          if (colIndex === 2) {
            td.className = 'select-column';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'checkbox-select';
            if (selectedCodes.includes(bayiKodu)) checkbox.checked = true;
            checkbox.addEventListener('change', (e) => {
              if (e.target.checked) {
                if (!selectedCodes.includes(bayiKodu)) selectedCodes.push(bayiKodu);
              } else {
                const idx = selectedCodes.indexOf(bayiKodu);
                if (idx > -1) selectedCodes.splice(idx, 1);
              }
            });
            td.appendChild(checkbox);
          } else if (colIndex === 3) {
            td.className = 'select-column';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'checkbox-video';
            if (videoCodes.has(bayiKodu)) checkbox.checked = true;
            checkbox.addEventListener('change', (e) => {
              if (e.target.checked) videoCodes.add(bayiKodu);
              else videoCodes.delete(bayiKodu);
            });
            td.appendChild(checkbox);
          } else if (colIndex === 6 && konum) {
            const actionDiv = document.createElement('div');
            actionDiv.className = 'action-column';

            const gBtn = document.createElement('button');
            gBtn.className = 'map-button google';
            gBtn.innerHTML = 'G';
            gBtn.title = 'Google Maps';
            gBtn.onclick = () => window.open(`https://www.google.com/maps/search/?api=1&query=${konum}`, '_blank');

            const yBtn = document.createElement('button');
            yBtn.className = 'map-button yandex';
            yBtn.innerHTML = 'Y';
            yBtn.title = 'Yandex Maps';
            yBtn.onclick = () => openYandexMaps(konum);

            const cBtn = document.createElement('button');
            cBtn.className = 'map-button copy';
            cBtn.innerHTML = 'K';
            cBtn.title = 'Koordinatı kopyala';
            cBtn.onclick = () => {
              navigator.clipboard.writeText(konum);
              alert('Koordinatlar kopyalandı.');
            };

            const sBtn = document.createElement('button');
            sBtn.className = 'map-button status-button';
            sBtn.innerHTML = 'D';
            sBtn.title = 'Mevcut konumundan hedefe kadar güzergahı analiz et';
            sBtn.onclick = () => openStatusPanel(bayiAdi, konum);

            actionDiv.appendChild(gBtn);
            actionDiv.appendChild(yBtn);
            actionDiv.appendChild(cBtn);
            actionDiv.appendChild(sBtn);
            td.appendChild(actionDiv);
          } else {
            td.textContent = cell || '';
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkDataExpiry();
      const saved = localStorage.getItem('excelData');
      if (saved) {
        excelData = JSON.parse(saved);
        displayResults(excelData);
      }

      const statusModal = document.getElementById('statusModal');
      const statusClose = document.getElementById('statusClose');
      statusClose.addEventListener('click', () => statusModal.classList.remove('show'));
      statusModal.addEventListener('click', (e) => {
        if (e.target === statusModal) statusModal.classList.remove('show');
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') statusModal.classList.remove('show');
      });
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const data = new Uint8Array(ev.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          excelData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          selectedCodes = [];
          videoCodes.clear();
          displayResults(excelData);
          saveDataToLocalStorage();
        };
        reader.readAsArrayBuffer(file);
      }
    });

    document.getElementById('search').addEventListener('input', function(e) {
      const query = e.target.value.toLowerCase();
      const filtered = excelData.filter((row, i) => {
        if (i === 0) return true;
        return row.some(cell => cell && cell.toString().toLowerCase().includes(query));
      });
      displayResults(filtered);
    });

    document.getElementById('copyButton').addEventListener('click', () => {
      const textToCopy = [];
      const dataMap = new Map();
      excelData.forEach((row, index) => {
        if (index === 0) return;
        const bKodu = row[7] ? row[7].toString() : null;
        if (bKodu) dataMap.set(bKodu, row);
      });

      selectedCodes.forEach(bKodu => {
        const row = dataMap.get(bKodu);
        if (row) {
          const sehir = (row[4] || '').toString().replace('•', '').trim();
          const bayiAdi = row[9];
          const isVideo = videoCodes.has(bKodu);
          const denetimMetni = isVideo ? 'Görüntülü' : 'Rutin';
          const denetimEmoji = isVideo ? '📸' : '📋';
          const cleanCode = bKodu.replace('#', '').trim();
          const satirMetni = `🏢 *Bayi:* ${bayiAdi}\n🪪 *Kod:* ${cleanCode}\n📌 *Şehir:* ${sehir}\n${denetimEmoji} *Denetim Türü:* ${denetimMetni}`;
          textToCopy.push(satirMetni);
        }
      });

      if (textToCopy.length > 0) {
        const finalText = `*Bugün FiDe Yapılacak Bayiler;*\n\n${textToCopy.join('\n------------------\n')}`;
        navigator.clipboard.writeText(finalText).then(() => alert('Whatsapp formatında emojili ve sırasına uygun olarak kopyalandı!'));
      } else {
        alert('Öncelikle "Seç" kutucuğundan en az bir bayi seçin!');
      }
    });

    document.getElementById('clearButton').addEventListener('click', () => {
      selectedCodes = [];
      videoCodes.clear();
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      alert('Tüm seçimler temizlendi.');
    });

    document.getElementById('dbButton').addEventListener('click', () => {
      if (confirm('Tüm kayıtlı veriler silinecek. Emin misiniz?')) {
        localStorage.removeItem('lastUploadDate');
        localStorage.removeItem('excelData');
        excelData = [];
        selectedCodes = [];
        videoCodes.clear();
        document.getElementById('tableBody').innerHTML = '';
        document.getElementById('resultsTable').style.display = 'none';
        alert('Veritabanı sıfırlandı!');
      }
    });
  </script>
</body>
</html>
